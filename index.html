<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global & Crypto Pulse</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0f19;
            color: #f8fafc;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
        }
        header {
            text-align: center;
            padding: 4rem 1rem 2rem 1rem;
            max-width: 600px;
        }
        h1 {
            font-size: 2.2rem;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 1.1rem;
            margin: 0;
        }
        main {
            width: 90%;
            max-width: 680px;
            margin-bottom: 2rem;
        }
        .card {
            background-color: #151d30;
            border: 1px solid #232f48;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .meta {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .date {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 30px;
        }
        .tag {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
            padding: 0.25rem 0.75rem;
            border-radius: 30px;
        }
        .title {
            font-size: 1.4rem;
            margin: 0 0 1rem 0;
            color: #f8fafc;
        }
        .content {
            color: #cbd5e1;
            font-size: 1.05rem;
        }
        .content p {
            margin: 0 0 1rem 0;
        }
        .content p:last-child {
            margin-bottom: 0;
        }
        .comment-section {
            width: 90%;
            max-width: 680px;
            background-color: #151d30;
            border: 1px solid #232f48;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 4rem;
            box-sizing: border-box;
        }
        footer {
            padding: 2rem;
            color: #94a3b8;
            font-size: 0.85rem;
            border-top: 1px solid #232f48;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌐 Global & Crypto Pulse</h1>
        <p class="subtitle">One post a day, connecting global events and crypto frontiers.</p>
    </header>

        <main>
        <!-- AUTOMATIC_POSTS_START -->
        <!-- 下方将由自动化机器人全自动注入精美的金十实时快讯卡片，永不重复 -->
        <!-- AUTOMATIC_POSTS_END -->
        </main>

    <section class="comment-section">
        <div class="giscus"></div>
    </section>

    <footer>
        <p>&copy; 2026 Global & Crypto Pulse. Domain actively maintained.</p>
    </footer>

    <!-- 🔧 Giscus Config -->
    <script src="https://giscus.app"
        data-repo="[Your_GitHub_Username]/[Your_Repo_Name]"
        data-repo-id="[Your_Repo_ID]"
        data-category="Announcements"
        data-category-id="[Your_Category_ID]"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="dark_dimmed"
        data-lang="en" 
        crossorigin="anonymous"
        async>
    </script>
</body>
</html>
