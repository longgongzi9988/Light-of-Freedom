name: Daily Auto News Update

on:
  schedule:
    # 每天国际标准时间 (UTC) 00:00 运行（对应美国时间傍晚/夜间，非常适合养域名更新）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在 GitHub 后台手动点击按钮立即触发更新测试

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        pip install requests urllib3

    - name: Run Auto News Script
      run: python fetch_news.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add index.html
        # 只有在代码有变动时才提交，防止报错
        git diff-index --quiet HEAD || git commit -m "Automated daily news update"
        git push
